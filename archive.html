<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFO Archive</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: #ccc;
      margin-left: 15px;
      text-decoration: none;
    }

    nav a:hover {
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .search {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .case-card {
      margin-bottom: 20px;
    }

    #debug {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <div><strong>UFO Archive Pro</strong></div>
    <nav>
      <a href="/">Home</a>
      <a href="/archive.html">Archive</a>
      <a href="/submit.html">Submit</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <div class="container">
    <h1>Approved UFO reports and published evidence</h1>
    <p>Browse public sightings and reviewed cases.</p>

    <div class="stats">
      <div>Reports: <span id="approved">0</span></div>
      <div>Media: <span id="media">0</span></div>
      <div>Locations: <span id="locations">0</span></div>
    </div>

    <div class="search">
      <input type="text" placeholder="Search reports (coming soon)">
    </div>

    <!-- THIS IS WHERE DATA WILL APPEAR -->
    <div id="archive-list"></div>

    <div id="debug"></div>
  </div>

  <!-- CONFIG -->
  <script>
    window.UFO_APP_CONFIG = {
      supabaseUrl: "https://YOUR_PROJECT_ID.supabase.co",
      supabaseAnonKey: "YOUR_ANON_KEY"
    };
  </script>

  <!-- MAIN SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
