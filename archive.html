<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFO Archive Pro</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: #ccc;
      margin-left: 15px;
      text-decoration: none;
    }

    nav a:hover {
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .search {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .case-card {
      margin-bottom: 20px;
    }

    #debug {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <div><strong>UFO Archive Pro</strong></div>
    <nav>
      <a href="/">Home</a>
      <a href="/archive.html">Archive</a>
      <a href="/submit.html">Submit</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <div class="container">
    <h1>Approved UFO reports and published evidence</h1>
    <p>Browse public sightings and reviewed cases.</p>

    <div class="stats">
      <div>Reports: <span id="approved">0</span></div>
      <div>Media: <span id="media">0</span></div>
      <div>Locations: <span id="locations">0</span></div>
    </div>

    <div class="search">
      <input type="text" placeholder="Search reports (coming soon)">
    </div>

    <div id="archive-list"></div>

    <div id="debug"></div>
  </div>

  <script>
    window.UFO_APP_CONFIG = {
      supabaseUrl: "https://YOUR_PROJECT_ID.supabase.co",
      supabaseAnonKey: "YOUR_ANON_KEY"
    };
  </script>

  <script>
    (async () => {
      const debug = document.getElementById("debug");

      function log(msg) {
        if (debug) debug.textContent = msg;
        console.log(msg);
      }

      try {
        const baseUrl = window.UFO_APP_CONFIG.supabaseUrl.replace(/\/$/, "");
        const apiKey = window.UFO_APP_CONFIG.supabaseAnonKey;

        const headers = {
          apikey: apiKey,
          Authorization: "Bearer " + apiKey,
          "Content-Type": "application/json"
        };

        log("Connecting...");

        const url = baseUrl + "/rest/v1/cases?status=eq.approved&order=created_at.desc";

        const res = await fetch(url, { headers });

        if (!res.ok) {
          const text = await res.text();
          log("ERROR " + res.status + ": " + text);
          return;
        }

        const data = await res.json();

        log("Loaded " + data.length + " approved case(s)");

        document.getElementById("approved").textContent = data.length;

        const mediaCount = data.filter(
          item => item.media_url || item.media_path
        ).length;

        document.getElementById("media").textContent = mediaCount;

        const uniqueLocations = new Set(
          data.map(item => item.location).filter(Boolean)
        );

        document.getElementById("locations").textContent = uniqueLocations.size;

        const container = document.getElementById("archive-list");
        container.innerHTML = "";

        if (!data.length) {
          container.innerHTML = "<p>No approved UFO reports yet.</p>";
          return;
        }

        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "case-card";

          const media = item.media_url
            ? `<img src="${item.media_url}" style="max-width:100%;border-radius:10px;margin-top:10px;">`
            : "";

          card.innerHTML = `
            <div style="padding:20px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:rgba(255,255,255,0.02);">
              <h3>${item.title || "No title"}</h3>
              <p>${item.location || ""}</p>
              <p>${item.summary || item.description || ""}</p>
              ${media}
            </div>
          `;

          container.appendChild(card);
        });

      } catch (e) {
        console.error(e);
        if (debug) debug.textContent = "ERROR: " + e.message;
      }
    })();
  </script>

</body>
</html>
