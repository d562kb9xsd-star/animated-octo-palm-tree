<!DOCTYPE html>
<html>
<head>
  <title>UFO Archive</title>
</head>

<body style="font-family: Arial; background:#f5f5f5; margin:0;">

<div style="max-width:1000px; margin:40px auto;">

<h1>🛸 UFO Archive</h1>

<div id="list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap:20px;">
Loading...
</div>

</div>

<script src="config.js"></script>

<script>
(async () => {
  const { supabaseUrl, supabaseAnonKey } = window.UFO_APP_CONFIG;

  const res = await fetch(
    supabaseUrl + "/rest/v1/cases?status=eq.approved&order=created_at.desc",
    {
      headers: {
        apikey: supabaseAnonKey,
        Authorization: "Bearer " + supabaseAnonKey
      }
    }
  );

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<p>No sightings yet</p>";
    return;
  }

  data.forEach(item => {
    const div = document.createElement("div");

    div.style.background = "white";
    div.style.borderRadius = "10px";
    div.style.boxShadow = "0 4px 10px rgba(0,0,0,0.1)";
    div.style.overflow = "hidden";

    div.innerHTML = `
      ${
        item.media_url
          ? `<img src="${item.media_url}" style="width:100%; height:200px; object-fit:cover;">`
          : ""
      }

      <div style="padding:15px">
        <h3 style="margin:0 0 10px 0;">${item.title}</h3>
        <p style="margin:0 0 10px 0; color:#555;">${item.description}</p>
        <p style="margin:0; font-size:14px;"><b>📍 ${item.location}</b></p>
      </div>
    `;

    list.appendChild(div);
  });
})();
</script>

</body>
</html>
