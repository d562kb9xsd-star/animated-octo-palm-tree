<!DOCTYPE html>
<html>
<head>
  <title>UFO Archive</title>
</head>
<body style="font-family: Arial; max-width: 900px; margin: 40px auto;">

<h1>🛸 UFO Archive</h1>
<div id="list">Loading...</div>

<script src="config.js"></script>

<script>
(async () => {
  const { supabaseUrl, supabaseAnonKey } = window.UFO_APP_CONFIG;

  const res = await fetch(
    supabaseUrl + "/rest/v1/cases?status=eq.approved&order=created_at.desc",
    {
      headers: {
        apikey: supabaseAnonKey,
        Authorization: "Bearer " + supabaseAnonKey
      }
    }
  );

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<p>No approved sightings yet</p>";
    return;
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.style.border = "1px solid #ccc";
    div.style.padding = "12px";
    div.style.marginBottom = "12px";

    div.innerHTML = `
      <h3>${item.title}</h3>
      <p>${item.description}</p>
      <p><b>Location:</b> ${item.location}</p>
      ${
        item.media_url
          ? `<img src="${item.media_url}" style="max-width:100%;">`
          : ""
      }
    `;

    list.appendChild(div);
  });
})();
</script>

</body>
</html>
